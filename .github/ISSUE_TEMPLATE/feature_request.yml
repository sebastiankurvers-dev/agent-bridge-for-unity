name: Feature Request
description: Suggest a new tool or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new MCP tool or an improvement to an existing one? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or task that is currently difficult or impossible.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you envision this working? Include tool names, parameters, or workflow steps if you have them.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried.
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New MCP tool
        - Improve existing tool
        - Bridge infrastructure
        - Documentation
        - Other
    validations:
      required: true
