name: Bug Report
description: Report a bug with the Agent Bridge for Unity
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: unity-version
    attributes:
      label: Unity Version
      placeholder: "e.g., 6000.3.5f2"
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET SDK Version
      placeholder: "e.g., 10.0.100"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: mcp-client
    attributes:
      label: MCP Client
      placeholder: "e.g., Claude Code, Cursor, Windsurf, VS Code"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste Unity console output, MCP server logs, or screenshots.
    validations:
      required: false
